# BUILD_BRIEF §11. The lease/timeout pair is asserted at startup by ConfigAssertions.
autwit:
  orchestrator:
    base-url: ${ORCHESTRATOR_URL:http://localhost:9090}
    token: ${ORCHESTRATOR_TOKEN:}
    timeout: 10m            # hard. Must be < run.lease
    catalog-sync-interval: 60s
  run:
    lease: 12m              # MUST exceed orchestrator.timeout
    reaper-interval: 60s
    worker-concurrency: 4
    max-attempts: 1         # never raise this for mutating skills
  artifact:
    max-inline-bytes: 8388608     # 8MB — matches SKILL_CONTRACT §6.1
    max-response-bytes: 33554432  # 32MB
  session:
    default-ttl: 7d

  # BUILD_BRIEF §7: "Put the rules in config, not in Java." These are business facts
  # about an order flow, not code -- QA learns something new and edits this, not Java.
  compare:
    financial:
      money-fields: [total_amount, amount, line_total, price, subtotal, tax, totalAmount]
      # Not zero. Independent systems round differently, and a report that screams
      # about 0.001 gets ignored -- which is worse than one that says nothing.
      tolerance: 0.01
      sum-invariants:
        - name: order_total_equals_line_items
          total-part: oms.orders
          total-field: total_amount
          entity-key: order_id
          parts-part: oms.order_items
          parts-field: line_total
          severity: critical
      cross-source:
        - name: order_total_consistency
          severity: high
          sources:
            - part-key: oms.orders
              field: total_amount
              entity-key: order_id
            - part-key: dynamo.order_doc
              field: totalAmount
              entity-key: orderId
            - part-key: api.order_response
              field: totalAmount
              entity-key: orderId

spring:
  application:
    name: autwit-copilot-api
  profiles:
    # BUILD_BRIEF §5: --mode=api|worker|all, default all.
    #
    # 'fake' is deliberately NOT in the default any more, now that
    # HttpOrchestratorClient exists. A default that silently replays fixtures is the
    # worst possible failure mode for this product: every capture would look real, and
    # the entire value of the tool is that a tester can trust what it shows them. An
    # unconfigured orchestrator failing loudly is strictly better than a configured one
    # lying quietly.
    #
    # Local dev and UI work opt in explicitly:
    #   ./mvnw spring-boot:run -Dspring-boot.run.profiles=all,fake
    default: all
  jackson:
    # openapi.yaml is snake_case throughout, and the UI generates its client from
    # that spec. This is what keeps the two in step.
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
      # Non-negotiable for this product. Without it Jackson parses "1200.00" as a
      # Double and renders it back as 1200.0: the content_hash then never matches
      # the orchestrator's, and every money diff is computed on a value whose scale
      # was silently destroyed in transit. BigDecimal preserves both.
      use-big-decimal-for-floats: true
  mvc:
    problemdetails:
      enabled: true
  # Required for SSE + 10-minute blocking orchestrator calls (invariant 12).
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autwit}
    username: ${DB_USER:autwit}
    password: ${DB_PASSWORD:autwit}
    hikari:
      # Sized above worker-concurrency: workers hold a connection for a run's
      # duration, and the API threads still need to serve reads.
      maximum-pool-size: 12
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Pin the history table's schema. Without this Flyway asks the connection for its
    # default schema, which Postgres resolves through search_path ('"$user", public').
    # V1 creates a schema named autwit and the DB user is also named autwit, so once
    # the migration has run, "$user" starts resolving and current_schema() flips from
    # public to autwit. Flyway then looks for autwit.flyway_schema_history, does not
    # find it, sees a non-empty autwit schema, and refuses to start -- so the app boots
    # exactly once and fails on every boot thereafter. Naming this explicitly makes the
    # history location independent of who connects.
    default-schema: public
  lifecycle:
    # Must exceed the 10m orchestrator timeout so in-flight runs drain on SIGTERM
    # rather than landing as timed_out (BUILD_BRIEF §5).
    timeout-per-shutdown-phase: 660s

server:
  shutdown: graceful
  servlet:
    context-path: /api/v1

logging:
  level:
    com.autwit.copilot: INFO
